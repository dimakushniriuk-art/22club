<!--
  Template email 22Club - Tema dark (logo centro, sfondo nero, testo bianco).
  Placeholder: {{title}}, {{message}}, {{athlete_name}}, {{info_block}}, {{cta_link}}, {{cta_text}}.
  Logo in alto: imposta NEXT_PUBLIC_EMAIL_LOGO_URL (URL assoluto) oppure NEXT_PUBLIC_APP_URL (usa /logo.png).
  In questo file sostituisci LOGO_URL_QUI con l'URL del logo se usi come template custom.
-->
<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{title}}</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #000000;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        color: #ffffff;
      }
      .wrapper {
        width: 100%;
        background: #000000;
        padding: 40px 16px;
      }
      .container {
        max-width: 560px;
        margin: 0 auto;
        background: #0b0b0b;
        border-radius: 14px;
        overflow: hidden;
        border: 1px solid #1f1f1f;
      }
      .header {
        padding: 32px 24px;
        text-align: center;
        border-bottom: 1px solid #1f1f1f;
      }
      .logo {
        width: 160px;
      }
      .body {
        padding: 32px 28px;
      }
      .greeting {
        font-size: 15px;
        color: #9ca3af;
        margin-bottom: 12px;
      }
      .title {
        font-size: 22px;
        font-weight: 600;
        margin-bottom: 16px;
        color: #ffffff;
      }
      .message {
        font-size: 15px;
        line-height: 1.7;
        color: #d1d5db;
        margin-bottom: 28px;
      }
      .info-box {
        background: #050505;
        border: 1px solid #1f1f1f;
        border-radius: 10px;
        padding: 16px;
        margin-bottom: 26px;
        font-size: 14px;
        color: #cbd5e1;
      }
      .button {
        display: inline-block;
        background: #02b3bf;
        color: #ffffff !important;
        text-decoration: none;
        padding: 12px 22px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
      }
      .footer {
        border-top: 1px solid #1f1f1f;
        padding: 20px 24px;
        text-align: center;
      }
      .brand {
        color: #02b3bf;
        font-weight: 600;
        margin-bottom: 6px;
      }
      .small {
        font-size: 12px;
        color: #6b7280;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="container">
        <div class="header">
          <img src="LOGO_URL_QUI" class="logo" alt="22Club" />
        </div>
        <div class="body">
          <p class="greeting">Ciao {{athlete_name}},</p>
          <h1 class="title">{{title}}</h1>
          <div class="message">{{message}}</div>
          <div class="info-box">{{info_block}}</div>
          <a href="{{cta_link}}" class="button">{{cta_text}}</a>
        </div>
        <div class="footer">
          <div class="brand">22Club</div>
          <div class="small">
            Questa email è stata inviata automaticamente dal sistema.<br />Non rispondere a questo
            messaggio.
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
