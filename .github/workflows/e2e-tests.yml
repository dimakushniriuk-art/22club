name: E2E Core Chromium

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CI: true
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  PLAYWRIGHT_TRAINER_EMAIL: ${{ secrets.PLAYWRIGHT_TRAINER_EMAIL }}
  PLAYWRIGHT_TRAINER_PASSWORD: ${{ secrets.PLAYWRIGHT_TRAINER_PASSWORD }}
  PLAYWRIGHT_ADMIN_EMAIL: ${{ secrets.PLAYWRIGHT_ADMIN_EMAIL }}
  PLAYWRIGHT_ADMIN_PASSWORD: ${{ secrets.PLAYWRIGHT_ADMIN_PASSWORD }}
  PLAYWRIGHT_ATHLETE_EMAIL: ${{ secrets.PLAYWRIGHT_ATHLETE_EMAIL }}
  PLAYWRIGHT_ATHLETE_PASSWORD: ${{ secrets.PLAYWRIGHT_ATHLETE_PASSWORD }}

jobs:
  e2e-core-chromium:
    name: e2e-core-chromium
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Build application
        run: npm run build

      - name: Run core E2E on Chromium
        run: npx playwright test tests/e2e/core-flows.spec.ts --project=chromium

      - name: Upload playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/

      - name: Upload test results on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test-results/
