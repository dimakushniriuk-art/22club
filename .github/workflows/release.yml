name: 🚀 Release Automation

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'
      - 'src/**'
      - 'docs/**'
      - '.storybook/**'
      - 'tests/**'
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Tipo di versione'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: |
          npm ci --legacy-peer-deps
          npm install -g standard-version

      - name: 🧹 Run cleanup
        run: npm run cleanup

      - name: 🔍 Lint check
        run: npm run lint

      - name: 🔧 Type check
        run: npm run typecheck

      - name: 🧪 Run tests
        run: npm run test:run

      - name: 🏗️ Build check
        run: npm run build

      - name: 📚 Build Storybook
        run: npm run storybook:build

      - name: 📖 Build Docsify
        run: npm run docs:build

      - name: 🏷️ Bump version & generate changelog
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            npx standard-version --release-as ${{ github.event.inputs.version_type }}
          else
            npx standard-version
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📤 Push new version tag
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git push --follow-tags origin main

      - name: 📋 Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: '22Club v${{ github.ref_name }}'
          body_path: CHANGELOG.md
          files: |
            .next/**
            storybook-static/**
            docs/**
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🚀 Deploy to Vercel
        if: success()
        run: |
          echo "Release ${{ github.ref_name }} created successfully!"
          echo "Vercel will automatically deploy from the main branch."

  notify:
    runs-on: ubuntu-latest
    needs: release
    if: always()

    steps:
      - name: 📢 Notify success
        if: needs.release.result == 'success'
        run: |
          echo "✅ Release ${{ github.ref_name }} completed successfully!"
          echo "🚀 Deployment to Vercel in progress..."
          echo "📚 Documentation updated"
          echo "📦 Storybook published"

      - name: 📢 Notify failure
        if: needs.release.result == 'failure'
        run: |
          echo "❌ Release failed!"
          echo "Please check the logs for details"
          exit 1
